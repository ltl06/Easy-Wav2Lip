# if this file opened after running Easy-Wav2Lip.bat, 
# please configure accordingly, save and then close this file,
# processing will then begin automatically.

[OPTIONS]

video_file = D:\hecheng\face.mp4
vocal_file =  D:\hecheng\qwen.wav

quality = Enhanced
# Options:
;         Fast:	Wav2Lip only
;     Improved:	Wav2Lip with a feathered mask around the mouth to remove the square around the face
;     Enhanced:	Wav2Lip + mask + GFPGAN upscaling done on the face
; Experimental:	Test version of applying gfpgan - see release notes

output_height = full resolution

# Options:
; full resolution
; half resolution
; video height in pixels eg: 480

wav2lip_version = Wav2Lip
# Wav2Lip or Wav2Lip_GAN

# Please consult the readme for this and the rest of the options:
; https://github.com/anothermartz/Easy-Wav2Lip#advanced-tweaking

use_previous_tracking_data = True

nosmooth = True

[PADDING]
u = 0
d = 0
l = 0
r = 0

[MASK]
size = 2.5
feathering = 2
mouth_tracking = False
debug_mask = False

[OTHER]
batch_process = False
output_suffix = _Easy-Wav2Lip
include_settings_in_suffix = False
preview_settings = False
frame_to_preview = 100

[VIEW]
# Head rotation: -1.0 (max left/down) to 1.0 (max right/up)
head_rotation_x = 0.0
head_rotation_y = 0.0
head_rotation_z = 0.0
# Animation mode: static, gentle_sway, nodding, look_around
view_animation = static
# Blink frequency: 0.0 (none) to 1.0 (frequent)
blink_frequency = 0.5
# Expression strength: 0.0 (subtle) to 1.0 (strong)
expression_strength = 0.5
